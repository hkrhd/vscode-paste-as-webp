name: Release Multi-Platform

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - .github/workflows/release.yml
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag || github.sha }}
  cancel-in-progress: false

jobs:
  validate:
    if: ${{ github.event_name != 'push' || contains(github.event.head_commit.message, '[publish-current-version]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run check-types

      - name: Run lint
        run: npm run lint

      - name: Run extension tests
        run: xvfb-run -a npm test

  build-and-publish:
    if: ${{ github.event_name != 'push' || contains(github.event.head_commit.message, '[publish-current-version]') }}
    needs: validate
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: windows-latest
            target: win32-x64
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: npm run package && npm exec -- vsce package --target ${{ matrix.target }} --out vsc-webp-paster-${{ matrix.target }}.vsix

      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npm exec -- vsce publish --target ${{ matrix.target }}
